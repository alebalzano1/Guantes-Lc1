<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Tienda | LC1 Goalkeeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .shop-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            padding: 8rem 5% 5rem;
        }
        
        .filters {
            background: #fdfdfd;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .filter-group h4 {
            margin-bottom: 1.5rem;
            color: var(--text-color);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            padding: 0.6rem 0;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
            width: 100%;
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }


        @media (max-width: 900px) {
            .shop-container {
                grid-template-columns: 1fr;
                padding-top: 6rem;
            }
            .filters {
                position: relative;
                top: 0;
                display: flex;
                flex-wrap: wrap;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            .filter-group {
                margin-bottom: 0;
                flex: 1;
                min-width: 140px;
            }
            .filter-options {
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo sport-font">
            <i class="fas fa-shield-halved"></i> LC1 GOALKEEPER
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="shop.html" class="active">Tienda</a></li>
            <li><a href="admin.html" class="admin-nav-link" title="Panel de Administración"><i class="fas fa-lock"></i></a></li>
        </ul>
        <div class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </div>
        <div class="cart-icon" id="cart-toggle">
            <i class="fas fa-shopping-cart fa-lg"></i>
            <span class="cart-count">0</span>
        </div>
    </nav>

    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="filters">
            <div class="filter-group">
                <h4 class="sport-font">Categorías</h4>
                <div class="filter-options" id="category-filters">
                    <button class="filter-btn active" onclick="filterByCategory('all', this)">Todos</button>
                    <button class="filter-btn" onclick="filterByCategory('guantes', this)">Guantes</button>
                    <button class="filter-btn" onclick="filterByCategory('indumentaria', this)">Indumentaria</button>
                    <button class="filter-btn" onclick="filterByCategory('reparacion', this)">Reparación</button>
                </div>
            </div>
            
            <div class="filter-group">
                <h4 class="sport-font">Precio</h4>
                <div class="filter-options">
                    <button class="filter-btn" onclick="filterByPrice('low')">Menor precio</button>
                    <button class="filter-btn" onclick="filterByPrice('high')">Mayor precio</button>
                </div>
            </div>
        </aside>

        <!-- Product Grid -->
        <main>
            <div id="shop-products" class="products-grid">
                <!-- Products will be injected by JS -->
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="dark-footer">
        <p>&copy; 2024 LC1 Goalkeeper. Todos los derechos reservados.</p>
        <p>
            Sitio web desarrollado por <a href="https://www.instagram.com/alebalzano1" target="_blank">Alejandro Balzano <i class="fab fa-instagram"></i></a>
        </p>
    </footer>

    <!-- Whatsapp Float -->
    <a href="https://wa.me/541140236384" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Instagram Float -->
    <a href="https://www.instagram.com/guantes.lc1?igsh=MTEyMmxrd3R2OGw5eQ==" class="instagram-float" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>

    <!-- Toast Component Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/scroll-reveal.js" defer></script>
    <script src="js/tracker.js" defer></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- LC1 Firebase Config & Service -->
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/products-data.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script>
        // Lógica específica de la página de tienda
        window.filterByCategory = (cat, btn) => {
            if (window.app_filter) {
                window.app_filter(cat);
            }
            
            // UI Update
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        };
    </script>
</body>
</html>
